<!doctype html>
<html lang="en">
<body>
<h2>CreditLens Report Generated</h2>
<table>
    <tr><th align="left">Report Name</th><td th:text="${job.name}"></td></tr>
    <tr><th align="left">Actual Generated File Name</th><td th:text="${reportFile.actualFileName}"></td></tr>
    <tr><th align="left">File Size</th><td th:text="${reportFile.sizeBytes} + ' bytes'"></td></tr>
    <tr><th align="left">File Type</th><td th:text="${reportFile.fileType}"></td></tr>
    <tr><th align="left">File Path</th><td th:text="${reportFile.path}"></td></tr>
    <tr><th align="left">Download Details</th><td th:text="'Available from configured CreditLens repository path'"></td></tr>
    <tr><th align="left">Generated Timestamp</th><td th:text="${reportFile.generatedTimestamp}"></td></tr>
    <tr><th align="left">Correlation ID</th><td th:text="${correlationId}"></td></tr>
</table>
<p th:text="${footer}"></p>
</body>
</html>
